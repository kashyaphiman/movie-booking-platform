spring:
  datasource:
    url: jdbc:h2:mem:movieticketdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        show_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: false  # Disable Flyway for H2

app:
  rate-limiting:
    enabled: false  # Disable rate limiting for development